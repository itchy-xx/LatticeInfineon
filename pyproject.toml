[tool.ruff]
line-length = 100
target-version = "py312"
[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# core.py/data_loader.py/scenarios.py deliberately mirror legacy/lattice_optimizer.py's own
# dense formula lines statement-for-statement (see core.py's module docstring) -- wrapping
# them to satisfy line-length would make the two harder to compare, not easier to read.
"apps/backend/app/optimizer/core.py" = ["E501", "B023", "B007"]
# B023/B007: the per-shipment pool-filtering closures and candidate-tuple unpacking mirror
# legacy/lattice_optimizer.py's own closure-in-loop and unused-tuple-field patterns exactly;
# each closure is invoked synchronously within the same loop iteration it's defined in (never
# stored for later), so the late-binding risk bugbear normally warns about doesn't apply here
# -- confirmed by the regression suite matching legacy's output exactly.
"apps/backend/app/optimizer/data_loader.py" = ["E501"]
"apps/backend/app/optimizer/scenarios.py" = ["E501"]
"apps/backend/tests/test_optimizer_regression.py" = ["E501"]
[tool.pytest.ini_options]
testpaths = ["apps/backend/tests", "services/data_pipeline/tests", "tests"]
pythonpath = ["apps/backend", "services/data_pipeline/src"]
addopts = "-q"
